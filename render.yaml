services:
  - type: web
    name: chatflow-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build && npm run prisma:migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GROK_API
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_STARTER_PRODUCT_ID
        sync: false
      - key: PADDLE_PRO_PRODUCT_ID
        sync: false
      - key: PADDLE_STARTER_PRICE_ID
        sync: false
      - key: PADDLE_PRO_PRICE_ID
        sync: false
